<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Product Detail | Dhiya Medical Agency</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <link rel="stylesheet" href="css/style.css?v=17">
  <link rel="stylesheet" href="css/product-detail.css?v=17">
  <link rel="stylesheet" href="css/responsive.css?v=17">
  <link rel="stylesheet" href="css/sticky-buttons.css?v=17">
  <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Crect width='32' height='32' rx='6' fill='%23030358'/%3E%3Ctext y='24' x='5' font-size='22' font-family='Arial' font-weight='900' fill='%23f8a217'%3ED%3C/text%3E%3C/svg%3E">
</head>
<body>
<header class="header"><div class="container">
  <a href="index.html" class="logo"><img src="images/logo.svg" alt="Dhiya Medical Agency"></a>
  <nav class="nav-links"><a href="index.html">Home</a><a href="products.html" class="active">Products</a><a href="about.html">About Us</a><a href="contact.html">Contact</a></nav>
  <div class="nav-actions"><a href="cart.html" class="nav-cart">🛒<span class="cart-badge cart-count" style="display:none">0</span></a><a href="login.html" class="btn btn-sm btn-secondary">Login</a></div>
  <button class="menu-toggle" id="menuToggle" aria-label="Menu"><span></span><span></span><span></span></button>
</div></header>
<nav class="mobile-nav" id="mobileNav"><a href="index.html">Home</a><a href="products.html">Products</a><a href="about.html">About</a><a href="contact.html">Contact</a></nav>
<main>
<section class="detail-hero"><div class="container">
  <div class="breadcrumb"><a href="index.html">Home</a><span>/</span><a href="products.html">Products</a><span>/</span><span id="breadcrumbName">Product</span></div>
</div></section>
<section class="container">
  <div class="detail-grid">
    <div class="detail-image"><div class="detail-image-placeholder" id="detailImg">💊</div></div>
    <div class="detail-info">
      <div class="detail-division" id="detailDivision">DIVISION</div>
      <h1 id="detailName">Product Name</h1>
      <p class="detail-composition" id="detailComposition">Composition details</p>
      <div class="detail-meta">
        <div class="meta-item"><span class="meta-label">Form: </span><span class="meta-value" id="detailForm">—</span></div>
        <div class="meta-item"><span class="meta-label">Packing: </span><span class="meta-value" id="detailPacking">—</span></div>
        <div class="meta-item"><span class="meta-label">Therapeutic: </span><span class="meta-value" id="detailTherapeutic">—</span></div>
      </div>
      <div id="detailStock"></div>

      <!-- Retail Pricing Block -->
      <div class="detail-retail-pricing" id="detailRetailPricing"></div>

      <!-- Trust Badges -->
      <div class="trust-badges-strip">
        <div class="trust-badge-item">
          <i class="fa-solid fa-truck-fast"></i>
          <span>Fast Delivery</span>
        </div>
        <div class="trust-badge-item">
          <i class="fa-solid fa-pills"></i>
          <span>Genuine Medicines</span>
        </div>
        <div class="trust-badge-item">
          <i class="fa-solid fa-certificate"></i>
          <span>Licensed Distributor</span>
        </div>
      </div>

      <!-- Pincode Checker -->
      <div id="pincodeWidget"></div>

      <div class="qty-selector">
        <button class="qty-btn" onclick="changeQty(-1)">−</button>
        <input type="number" class="qty-input" id="qtyInput" value="1" min="1" max="999">
        <button class="qty-btn" onclick="changeQty(1)">+</button>
      </div>
      <div class="detail-actions">
        <button class="btn btn-lg btn-primary" id="addToCartBtn">Add to Cart</button>
        <a href="contact.html" class="btn btn-lg btn-secondary">Enquire Now</a>
      </div>
    </div>
  </div>
</section>

<section class="related-section">
  <div class="container">
    <h2>Related Products</h2>
    <div class="related-grid" id="relatedGrid"></div>
  </div>
</section>
</main>

<footer class="footer"><div class="container"><div class="footer-bottom"><span>© 2026 Dhiya Medical Agency. All rights reserved.</span></div></div></footer>
<script src="js/products.js?v=17"></script>
<script src="js/app.js?v=17"></script>
<script src="js/pincode.js?v=17"></script>
<script src="js/sticky-buttons.js?v=17"></script>
<script>
const colorMap = {AUSPIN:'#0EA5E9',CURE:'#8B5CF6',GRACE:'#EC4899',MIND:'#F59E0B',PRIMA:'#0A6E3D',OPTHO:'#06B6D4',NURALZ:'#F97316',EVERMED:'#10B981',GENVIMAX:'#6366F1',MEDANOR:'#EF4444',VENTILA:'#14B8A6'};
function changeQty(d) { const i=document.getElementById('qtyInput'); i.value=Math.max(1,parseInt(i.value||1)+d); }
document.addEventListener('DOMContentLoaded', () => {
  const rawId = new URLSearchParams(window.location.search).get('id');
  // Try numeric first for catalog products, but keep raw string for admin products
  const numericId = parseInt(rawId);
  let product = null;
  
  // Search built-in catalog
  product = ProductData.find(p => p.id === numericId || String(p.id) === String(rawId));
  
  // If not found, search admin-added products from localStorage
  if (!product) {
    try {
      const adminProds = JSON.parse(localStorage.getItem('admin_products') || '[]');
      product = adminProds.find(p => String(p.id) === String(rawId));
      if (product) {
        // Normalize admin product fields
        product = {
          ...product,
          stock: product.inStock !== false,
          composition: product.desc || product.composition || '',
          therapeutic: product.division || 'GENERAL',
          form: product.form || 'Custom',
          mrp: parseFloat(product.mrp) || 0,
          ptr: product.ptr || (parseFloat(product.mrp) * 0.76),
          pts: product.pts || (parseFloat(product.mrp) * 0.68),
          packType: product.packType || '',
          packing: product.packing || ''
        };
      }
    } catch (e) {
      console.error('[ProductDetail] Error searching admin products:', e);
    }
  }
  
  if (!product) { document.querySelector('.detail-grid').innerHTML = '<div class="no-results" style="grid-column:1/-1"><h3>Product not found</h3><p><a href="products.html">Browse all products</a></p></div>'; return; }
  const col = colorMap[product.division] || '#0A6E3D';
  document.title = `${product.name} | Dhiya Medical Agency`;
  document.getElementById('breadcrumbName').textContent = product.name;
  document.getElementById('detailName').textContent = product.name;
  document.getElementById('detailComposition').textContent = product.composition;
  document.getElementById('detailForm').textContent = product.form;
  document.getElementById('detailPacking').textContent = (product.packing ? product.packing + ' | ' : '') + product.packType;
  document.getElementById('detailTherapeutic').textContent = product.therapeutic;
  const div = document.getElementById('detailDivision');
  div.textContent = product.division;
  div.style.background = col;
  const imgContainer = document.getElementById('detailImg');
  if (product.img) {
    imgContainer.innerHTML = `<img src="${product.img}" alt="${product.name}" style="width:100%;height:100%;object-fit:contain;">`;
    imgContainer.style.background = 'transparent';
  } else {
    imgContainer.style.background = `linear-gradient(135deg,${col}22,${col}11)`;
    imgContainer.style.color = col;
  }
  document.getElementById('detailStock').innerHTML = product.stock ? '<div class="stock-badge stock-in">✓ In Stock</div>' : '<div class="stock-badge stock-out">✕ Out of Stock</div>';

  // Retail Pricing Display
  const mrp = parseFloat(product.mrp || 0);
  const sellingPrice = parseFloat(product.ptr || mrp * 0.76);
  const discount = mrp > 0 ? Math.round(((mrp - sellingPrice) / mrp) * 100) : 0;
  const savings = mrp - sellingPrice;

  document.getElementById('detailRetailPricing').innerHTML = `
    <div class="retail-detail-pricing">
      <div class="retail-detail-row">
        <div class="retail-detail-main">
          <span class="retail-detail-label">Our Price</span>
          <span class="retail-detail-price">₹${sellingPrice.toFixed(2)}</span>
        </div>
        <div class="retail-detail-mrp">
          <span class="retail-detail-label">MRP</span>
          <span class="retail-detail-mrp-value"><s>₹${mrp.toFixed(2)}</s></span>
        </div>
        ${discount > 0 ? `<div class="retail-detail-discount">${discount}% OFF</div>` : ''}
      </div>
      ${savings > 0 ? `<div class="retail-detail-savings"><i class="fa-solid fa-piggy-bank"></i> You Save: ₹${savings.toFixed(2)}</div>` : ''}
    </div>
  `;

  // Pincode Widget
  document.getElementById('pincodeWidget').innerHTML = PincodeChecker.renderWidget();
  PincodeChecker.initAutoCheck();

  document.getElementById('addToCartBtn').addEventListener('click', () => {
    const qty = parseInt(document.getElementById('qtyInput').value) || 1;
    DhiyaMedical.addToCart(product, qty);
  });
  // Related products (only from catalog for admin products)
  const related = ProductData.filter(p => p.division === product.division && String(p.id) !== String(product.id)).slice(0, 4);
  document.getElementById('relatedGrid').innerHTML = related.map(p => generateProductCard(p, false)).join('');
});
</script>
</body>
</html>
